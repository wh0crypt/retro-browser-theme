<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Retro Terminal</title>

    <style>
        body {
            background-color: #0a0f0a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            padding: 50px;
            margin: 0;
            text-shadow: 0 0 5px #00ff66;
            overflow: hidden;
        }

        .crt-effect {
            position: fixed;
            inset: 0;

            background:
                linear-gradient(rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg,
                    rgba(255, 0, 0, 0.06),
                    rgba(0, 255, 0, 0.02),
                    rgba(0, 0, 255, 0.06));

            background-size: 100% 4px, 6px 100%;

            pointer-events: none;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: #00ff66;
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            49% {
                opacity: 1;
            }

            50%,
            100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="crt-effect"></div>

    <h1>BRAVE MAINFRAME SYSTEM OS v7.4.2</h1>

    <p>COPYRIGHT (C) 1976, BRAVE INDUSTRIES INC.</p>

    <p>READY.</p>

    <p>_> <span class="cursor"></span></p>
</body>

</html>
